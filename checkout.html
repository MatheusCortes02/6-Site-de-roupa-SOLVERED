<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Finalizar Compra</title>
    <link rel="stylesheet" href="css/check.css">
</head>
<body>

    <div class="container-checkout">
        <div class="checkout-main">
            
            <div class="checkout-dados">
                <h2>Finalizar Compra</h2>
                
                <section class="checkout-section">
                    <h3>1. Informações de Entrega</h3>
                    <div class="input-group">
                        <input type="text" placeholder="CEP" class="input-cep">
                        <input type="text" placeholder="Endereço Completo">
                        <div class="input-row">
                            <input type="text" placeholder="Número">
                            <input type="text" placeholder="Complemento">
                        </div>
                    </div>
                </section>

                <section class="checkout-section">
                    <h3>2. Método de Pagamento</h3>
                    <div class="pagamento-opcoes">
                        <label class="pagamento-card">
                            <input type="radio" name="pagamento" checked>
                            <span>Pix (5% OFF)</span>
                        </label>
                        <label class="pagamento-card">
                            <input type="radio" name="pagamento">
                            <span>Cartão de Crédito</span>
                        </label>
                    </div>
                </section>

                <button class="btn-finalizar-checkout">Confirmar Pedido</button>
            </div>

            <aside class="checkout-resumo">
                <h3>Seu Pedido</h3>
                <div class="resumo-itens">
                    <div class="resumo-item-mini">
                        <span id="nome-produto-resumo">Produto</span>
                        <span id="preco-produto-resumo">R$ 0,00</span>
                    </div>
                </div>
                <div class="resumo-total">
                    <div class="total-linha">
                        <span>Subtotal</span>
                        <span id="subtotal-valor">R$ 0,00</span>
                    </div>
                    <div class="total-linha">
                        <span>Frete</span>
                        <span class="frete-gratis">Grátis</span>
                    </div>
                    <div class="total-linha principal">
                        <span>Total</span>
                        <span id="total-final">R$ 0,00</span>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>

    <script src="js/carrinho.js"></script>
</body>
</html>
